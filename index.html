<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Save the Date – Merilen & Ivica</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Great+Vibes&family=Montserrat:wght@200;300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      min-height: 100%;
      overflow: hidden;
      background: #f7f4ef;
      font-family: 'Cormorant Garamond', serif;
    }
    body { position: fixed; inset: 0; min-height: 100dvh; }
    .screen {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      min-height: 100dvh;
      overflow: hidden;
      background: #f7f4ef;
      cursor: pointer;
      touch-action: manipulation;
    }
    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.55s ease;
    }
    .slide.active { opacity: 1; pointer-events: auto; }
    .slide-content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 1.2s ease;
      z-index: 5;
      padding: calc(env(safe-area-inset-top) + 24px) 8vw calc(env(safe-area-inset-bottom) + 24px);
      min-height: 100dvh;
    }
    .slide-content.show { opacity: 1; }
    .word {
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
    .word.show-word {
      opacity: 1;
      transform: translateY(0);
    }

    .s1, .s3, .s4, .s6 { background: #f7f4ef; }
    .s2, .s5 { background: #111; }

    .s1-text { text-align: center; transform: translateY(0); }
    .s1-save, .s1-date {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(56px, 10.5vw, 88px);
      font-weight: 600;
      color: #161616;
      line-height: 0.9;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 0.9s ease, transform 0.9s ease;
    }
    .s1-the {
      display: block;
      font-family: 'Great Vibes', cursive;
      font-size: clamp(38px, 7vw, 58px);
      color: #2b2b2b;
      line-height: 1;
      margin: 0.1em 0;
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 0.9s ease, transform 0.9s ease;
    }
    .s1-text.step-1 .s1-save,
    .s1-text.step-2 .s1-the,
    .s1-text.step-3 .s1-date,
    .s2-names.step-1 .s2-name-1,
    .s2-names.step-2 .s2-und,
    .s2-names.step-3 .s2-name-2,
    .s2-names.step-4 .s2-sub {
      opacity: 1;
      transform: translateY(0);
    }

    .s2-img, .s5-img {
      position: absolute;
      inset: 0;
      z-index: 1;
      width: 100%;
      height: 100%;
    }
    .s2-img img, .s5-img img {
      width: 100%;
      height: 100%;
      filter: contrast(1.04) brightness(0.92) saturate(1.02);
      display: block;
    }
    .s2-img img {
      object-fit: cover;
      object-position: center 18%;
      transform: scale(1);
      transition: transform 5.2s ease;
    }
    .slide.active .s2-img img {
      transform: scale(1.06);
    }
    .s5-img {
      overflow: hidden;
      background: #111;
    }
    .s5-img img {
      width: auto;
      height: 100%;
      min-width: 100%;
      max-width: none;
      object-fit: contain;
      transform: translateX(0);
      transition: transform 7s ease;
    }
    .slide.active .s5-img img {
      transform: translateX(-18%);
    }

    .s2-grad {
      position: absolute;
      inset: 0;
      z-index: 2;
      background: linear-gradient(to bottom, rgba(0,0,0,0.00) 0%, rgba(0,0,0,0.06) 48%, rgba(0,0,0,0.46) 100%);
    }
    .s2 .slide-content {
      justify-content: center;
      align-items: center;
      padding: 0 8vw;
      z-index: 6;
    }
    .s2-names {
      text-align: center;
      width: 100%;
      max-width: 88vw;
      margin: 0 auto;
    }
    .s2-name {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(36px, 7.2vw, 58px);
      font-weight: 600;
      color: #ffffff;
      letter-spacing: 0.06em;
      line-height: 0.92;
      text-transform: uppercase;
      text-shadow: 0 2px 14px rgba(0,0,0,0.22);
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 1.2s ease, transform 1.2s ease;
    }
    .s2-und {
      display: block;
      font-family: 'Great Vibes', cursive;
      font-size: clamp(28px, 5.2vw, 40px);
      color: #ffffff;
      line-height: 1;
      margin: 0.08em 0;
      text-shadow: 0 2px 10px rgba(0,0,0,0.18);
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 1.2s ease, transform 1.2s ease;
    }
    .s2-sub {
      display: block;
      margin-top: 0.9em;
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(14px, 2.7vw, 18px);
      letter-spacing: 0.18em;
      color: rgba(255,255,255,0.99);
      text-transform: uppercase;
      padding-left: 0.18em;
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 1.2s ease, transform 1.2s ease;
    }

    .s3-inner {
      position: relative;
      text-align: center;
    }
    .s3-num {
      display: block;
      font-size: clamp(92px, 20vw, 150px);
      font-weight: 300;
      color: #181818;
      line-height: 0.86;
    }
    .s3-lbl {
      display: block;
      font-family: 'Great Vibes', cursive;
      font-size: clamp(26px, 5.5vw, 40px);
      color: #a8a19b;
      margin: 0.34em 0 0.42em;
      line-height: 1;
    }
    .s3-inner .s3-lbl:last-child {
      margin-top: 0.9em;
      margin-bottom: 0;
    }

    .s4-venue {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(42px, 9vw, 72px);
      color: #222;
      text-align: center;
      line-height: 1.3;
      padding: 0 8vw;
      width: 100%;
    }
    .s4-sub {
      margin-top: 1.5em;
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(14px, 2.8vw, 18px);
      font-weight: 500;
      letter-spacing: 0.24em;
      color: #9b8b78;
      text-transform: uppercase;
      text-align: center;
      padding-left: 0.24em;
    }

    .s6-block {
      text-align: center;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .s6-l1 {
      display: block;
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(12px, 2.8vw, 18px);
      font-weight: 600;
      letter-spacing: 0.42em;
      color: #1a1a1a;
      text-transform: uppercase;
      line-height: 1.9;
      padding-left: 0.42em;
    }
    .s6-l2 {
      display: block;
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(13px, 2.9vw, 18px);
      font-weight: 500;
      letter-spacing: 0.3em;
      color: #4f4f4f;
      text-transform: uppercase;
      line-height: 1.9;
      padding-left: 0.3em;
    }
    .s6-script {
      display: block;
      font-family: 'Great Vibes', cursive;
      font-size: clamp(42px, 8vw, 68px);
      color: #777777;
      line-height: 1.15;
      margin-top: 0.18em;
    }
    .s6-date {
      display: block;
      margin-top: 2em;
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(15px, 3vw, 20px);
      font-weight: 500;
      letter-spacing: 0.26em;
      color: #b9924d;
      text-transform: uppercase;
      padding-left: 0.26em;
    }

    .dots {
      position: absolute;
      left: 0;
      right: 0;
      bottom: max(18px, env(safe-area-inset-bottom));
      display: flex;
      justify-content: center;
      gap: 7px;
      z-index: 50;
    }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(80,80,80,0.22);
      transition: transform 0.25s ease, background 0.25s ease;
    }
    .dot.active { background: #1a1a1a; transform: scale(1.45); }
    .dot.white { background: rgba(255,255,255,0.35); }
    .dot.white.active { background: #fff; }
  </style>
</head>
<body>
  <div class="screen" id="screen" onclick="handleTap()">
    <div class="slide s1 active" id="slide-1">
      <div class="slide-content" id="sc-1">
        <div class="s1-text">
          <span class="s1-save word">SAVE</span>
          <span class="s1-the word">the</span>
          <span class="s1-date word">DATE</span>
        </div>
      </div>
    </div>

    <div class="slide s2" id="slide-2">
      <div class="s2-img">
        <img src="IMG_5887.jpg" alt="Merilen & Ivica" />
      </div>
      <div class="s2-grad"></div>
      <div class="slide-content" id="sc-2">
        <div class="s2-names">
          <span class="s2-name s2-name-1 word">MERILEN</span>
          <span class="s2-und word">i</span>
          <span class="s2-name s2-name-2 word">IVICA</span>
        </div>
      </div>
    </div>

    <div class="slide s3" id="slide-3">
      <div class="slide-content" id="sc-3">
        <div class="s3-inner">
          <span class="s3-num word">06</span>
          <span class="s3-lbl word">petak, šesti</span>
          <span class="s3-num word">08</span>
          <span class="s3-lbl word">kolovoz</span>
          <span class="s3-num word">27</span>
          <span class="s3-lbl word">godine</span>
        </div>
      </div>
    </div>

    <div class="slide s4" id="slide-4">
      <div class="slide-content" id="sc-4">
        <div class="s4-venue"><span class="word">Majestic Park</span><br/><span class="word">Zagreb</span></div>
        <div class="s4-sub word">lokacija</div>
      </div>
    </div>

    <div class="slide s5" id="slide-5">
      <div class="s5-img">
        <img src="image.JPG" alt="Majestic Park Zagreb" />
      </div>
    </div>

    <div class="slide s6" id="slide-6">
      <div class="slide-content" id="sc-6">
        <div class="s6-block">
          <span class="s6-l1 word">POZIVNICA</span>
          <span class="s6-l2 word">I DETALJI</span>
          <span class="s6-script word">slijede uskoro</span>
          <span class="s6-date word">06 · 08 · 2027</span>
        </div>
      </div>
    </div>

    <div class="dots" id="dots">
      <div class="dot active" id="d0"></div>
      <div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div>
      <div class="dot" id="d3"></div>
      <div class="dot" id="d4"></div>
      <div class="dot" id="d5"></div>
    </div>
  </div>

  <audio id="bg-music" loop playsinline preload="auto">
    <source src="Save the Date.mp3" type="audio/mpeg">
  </audio>

  <script>
    const TOTAL = 6;
    const darkSlides = [1, 4];
    const timing = [
      { text: 900, hold: 6200 },
      { text: 1800, hold: 7200 },
      { text: 900, hold: 9800 },
      { text: 0, hold: 6200 },
      { text: 900, hold: 6200 },
      { text: 900, hold: 0 }
    ];

    let current = 1;
    let contentTimer = null;
    let slideTimer = null;
    let musicStarted = false;
    const music = document.getElementById('bg-music');

    function startMusic() {
      if (!music || musicStarted) return;
      music.volume = 1;
      music.play().then(() => {
        musicStarted = true;
      }).catch(() => {});
    }

    function updateDots(n) {
      const isDark = darkSlides.includes(n - 1);
      for (let i = 0; i < TOTAL; i++) {
        const d = document.getElementById('d' + i);
        d.className = 'dot';
        if (isDark) d.classList.add('white');
        if (i === n - 1) d.classList.add('active');
      }
    }

    function showWordsSequentially(container, startDelay = 250, stepDelay = 500) {
      if (!container) return;
      const words = container.querySelectorAll('.word');
      words.forEach((word, index) => {
        setTimeout(() => word.classList.add('show-word'), startDelay + index * stepDelay);
      });
    }

    function showSlide(n) {
      clearTimeout(contentTimer);
      clearTimeout(slideTimer);
      for (let i = 1; i <= TOTAL; i++) {
        document.getElementById('slide-' + i).classList.remove('active');
        const sc = document.getElementById('sc-' + i);
        if (sc) {
          sc.classList.remove('show');
          sc.querySelectorAll('.word').forEach(word => word.classList.remove('show-word'));
        }
      }

      current = n;
      const slideEl = document.getElementById('slide-' + n);
      const contentEl = document.getElementById('sc-' + n);
      const t = timing[n - 1];
      slideEl.classList.add('active');
      updateDots(n);

      if (contentEl && n !== 5) {
        contentTimer = setTimeout(() => {
          contentEl.classList.add('show');
          showWordsSequentially(contentEl, 450, n === 2 ? 1150 : 850);
        }, t.text);
      }

      if (t.hold > 0) {
        const totalWait = (n === 5 ? 0 : t.text) + t.hold;
        slideTimer = setTimeout(() => {
          if (current < TOTAL) showSlide(current + 1);
        }, totalWait);
      }
    }

    function handleTap() {
      startMusic();
      if (current < TOTAL) showSlide(current + 1);
    }

    window.addEventListener('load', () => {
      setTimeout(() => showSlide(1), 300);
    });

    document.addEventListener('touchstart', startMusic, { once: true });
    document.addEventListener('click', startMusic, { once: true });
  </script>
</body>
</html>
